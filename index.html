<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дешифратор</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;text-align:center;padding:20px;}
h1{color:gold;}
input{font-size:24px;padding:10px;width:300px;text-align:center;background:#222;color:gold;border:2px solid gold;border-radius:10px;}
button{padding:15px 30px;font-size:20px;background:gold;color:#000;border:none;border-radius:50px;cursor:pointer;margin:20px;}
.slot{display:inline-block;width:60px;height:80px;border:2px solid gold;border-radius:10px;margin:5px;font-size:36px;line-height:80px;background:#222;}
#result{font-size:48px;font-weight:bold;color:gold;margin-top:20px;}
</style>
</head>
<body>
<h1>🔐 Дешифратор</h1>
<p>Введи 5 літер, зібраних на станціях:</p>
<div id="slots"></div>
<input id="code" maxlength="5" placeholder="_ _ _ _ _">
<button onclick="decode()">Розшифрувати</button>
<div id="result"></div>
<script>
const ENC=['П','М','Ї','Н','Р'];
const DEC=['О','Л','І','М','П'];
const slots=document.getElementById('slots');
for(let i=0;i<5;i++){
 let d=document.createElement('div');
 d.className='slot';
 d.id='s'+i;
 d.textContent='_';
 d.dataset.station=['Син','Жов','Чор','Зел','Чер'][i];
 slots.appendChild(d);
}
document.getElementById('code').addEventListener('input',function(){
 let val=this.value.toUpperCase().replace(/[^А-ЯІЇЄҐA-Z]/g,'');
 this.value=val;
 for(let i=0;i<5;i++){
   let s=document.getElementById('s'+i);
   s.textContent=val[i]||'_';
 }
});
function decode(){
 let val=document.getElementById('code').value.toUpperCase();
 if(val.length<5){alert('Введи всі 5 літер!');return;}
 for(let i=0;i<5;i++) if(val[i]!==ENC[i]){alert('Помилка на позиції '+(i+1));return;}
 let res=DEC.join('');
 document.getElementById('result').textContent='✅ Розшифровано: '+res;
 alert('🎉 Вітаємо! Ти розгадав слово: '+res);
}
</script>
</body>
</html>
